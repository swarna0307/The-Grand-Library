<nav class="navbar">
  <div class="nav-left">
    <button class="hamburger-btn" (click)="toggleSidebar()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <div class="nav-brand">
      <span class="brand-icon">📚</span>
      <span class="brand-text">The Grand Library</span>
    </div>
  </div>

  <div class="nav-right">
    <div class="nav-user-info">
      <span class="nav-username">{{ auth.getUsername() }}</span>
      <span class="role-chip" [ngClass]="'chip-' + auth.getRole().toLowerCase()">
        {{ auth.getRole() }}
      </span>
    </div>

    <!-- Profile Icon Button -->
    <button class="profile-btn" (click)="profile.open()" title="My Profile">
      <div class="avatar-sm">{{ initials }}</div>
    </button>

    <button class="logout-btn" (click)="logout()" title="Logout">
      <span>⏻</span>
      <span>Logout</span>
    </button>
  </div>
</nav>

<!-- Profile Panel (shared component) -->
<app-profile #profile></app-profile>
