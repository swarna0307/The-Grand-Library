<!-- Profile icon button is embedded in navbar; this is the slide-out panel -->
<div class="profile-backdrop" *ngIf="show" (click)="close()"></div>

<div class="profile-panel" [class.open]="show">
  <div class="profile-panel-header">
    <h3>My Profile</h3>
    <button class="close-btn" (click)="close()">✕</button>
  </div>

  <div class="loading" *ngIf="loading">Loading profile...</div>
  <div class="alert alert-error" *ngIf="error">{{ error }}</div>
  <div class="alert alert-success" *ngIf="success">✅ {{ success }}</div>

  <div *ngIf="!loading && user && !editing" class="profile-view">
    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-xl">{{ initials }}</div>
      <div class="avatar-info">
        <div class="profile-name">{{ user.username }}</div>
        <span class="badge" [ngClass]="roleClass">{{ roleDisplay }}</span>
      </div>
    </div>

    <!-- Detail rows -->
    <div class="detail-list">
      <div class="detail-row">
        <span class="detail-label">📧 Email</span>
        <span class="detail-value">{{ user.email }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">📞 Phone</span>
        <span class="detail-value">{{ user.phone || '—' }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">🧑 Gender</span>
        <span class="detail-value">{{ user.gender || '—' }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">📍 Address</span>
        <span class="detail-value">{{ user.address || '—' }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">📅 Joined</span>
        <span class="detail-value">{{ user.registeredDate | date:'mediumDate' }}</span>
      </div>
    </div>

    <button class="btn btn-primary w-full" (click)="startEdit()">✏️ Edit Profile</button>
  </div>

  <!-- Edit form -->
  <div *ngIf="!loading && editing" class="profile-edit">
    <div class="form-group">
      <label>Email *</label>
      <input type="email" class="form-control" [(ngModel)]="form.email" placeholder="Email">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" class="form-control" [(ngModel)]="form.phone" placeholder="Phone">
    </div>
    <div class="form-group">
      <label>Gender</label>
      <select class="form-control" [(ngModel)]="form.gender">
        <option value="">Select</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Address</label>
      <input class="form-control" [(ngModel)]="form.address" placeholder="Address">
    </div>
    <div class="edit-actions">
      <button class="btn btn-secondary" (click)="cancelEdit()">Cancel</button>
      <button class="btn btn-primary" (click)="save()" [disabled]="saving">
        {{ saving ? 'Saving...' : '💾 Save' }}
      </button>
    </div>
  </div>
</div>
