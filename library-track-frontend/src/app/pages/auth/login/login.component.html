<div class="auth-page">
  <div class="auth-left">
    <div class="auth-branding">

      <h2>Welcome to The Grand Library</h2>
      <p>Your personal gateway to a world of endless stories and knowledge. Sign in to manage your collection and
        reading journey.</p>

    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card glass-card">
      <div class="auth-header">
        <a routerLink="/" class="back-link">← Back to Home</a>
        <h1>Welcome Back, Member</h1>
        <p>Sign in to your library portal</p>
      </div>

      <div class="alert alert-error" *ngIf="error">{{ error }}</div>

      <form (ngSubmit)="login()" #loginForm="ngForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" class="form-control" [(ngModel)]="username" name="username"
            placeholder="Enter your username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" [(ngModel)]="password" name="password"
            placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary login-btn" [disabled]="loading">
          <span *ngIf="!loading">🗝️ Enter the Library</span>
          <span *ngIf="loading">Opening doors...</span>
        </button>
      </form>

      <div class="auth-footer">
        <span>Not a member yet?</span>
        <a routerLink="/register">Register as a member →</a>
      </div>


    </div>
  </div>
</div>
